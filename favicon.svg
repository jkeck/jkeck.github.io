<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg     { fill: #f0eee9; }
    .block  { fill: #1a1714; }
    .letter { fill: #f0eee9; }
    @media (prefers-color-scheme: dark) {
      .bg     { fill: #1a1714; }
      .block  { fill: #d4a574; }
      .letter { fill: #1a1714; }
    }
  </style>
  <rect class="bg" width="32" height="32"/>
  <rect class="block" x="3" y="6" width="26" height="20" rx="1"/>
  <text class="letter" x="16" y="21.5" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-weight="600" font-size="16" letter-spacing="-0.5">JK</text>
</svg>
