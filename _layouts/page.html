---
layout: default
---
<style>
  .page-body-wrap { max-width: 720px; margin: 0 auto; padding: 48px 36px 80px; }
  .page-body-wrap h1 {
    font-family: var(--display); font-size: 42px; font-weight: 500;
    letter-spacing: -0.02em; line-height: 1.1; color: var(--text); margin-bottom: 32px;
    padding-bottom: 20px; border-bottom: 1px solid var(--rule2);
  }
  .page-body { font-family: var(--serif); font-size: 18px; line-height: 1.75; color: var(--text-sub); }
  .page-body > p { margin-bottom: 1.4em; }
  .page-body h2 {
    font-family: var(--display); font-size: 26px; font-weight: 500;
    color: var(--text); margin: 2.2em 0 0.6em; letter-spacing: -0.01em;
  }
  .page-body h3 {
    font-family: var(--display); font-size: 20px; font-weight: 500;
    color: var(--text); margin: 1.8em 0 0.5em;
  }
  .page-body a { color: var(--amber); text-decoration: none; }
  .page-body a:hover { text-decoration: underline; }
  .page-body strong { color: var(--text); font-weight: 500; }
  .page-body code {
    font-family: var(--mono); font-size: 0.84em;
    background: var(--panel); color: var(--text);
    padding: 2px 6px; border-radius: 3px; border: 1px solid var(--rule);
  }
  .page-body pre {
    background: var(--panel); border: 1px solid var(--rule); border-radius: 6px;
    padding: 20px 24px; overflow-x: auto; margin: 1.6em 0;
  }
  .page-body pre code { background: none; border: none; padding: 0; font-size: 13px; line-height: 1.6; }
  .page-body blockquote {
    border-left: 2px solid var(--amber); padding: 4px 0 4px 20px;
    margin: 1.6em 0; color: var(--text-sub); font-style: italic;
  }
  .page-body ul, .page-body ol { padding-left: 1.6em; margin-bottom: 1.4em; }
  .page-body li { margin-bottom: 0.4em; }
  .page-body img { max-width: 100%; border-radius: 4px; margin: 1.2em 0; display: block; }
  @media (max-width: 768px) {
    .page-body-wrap { padding: 32px 20px 60px; }
    .page-body-wrap h1 { font-size: 30px; }
    .page-body { font-size: 16px; }
  }
</style>
<div class="page-body-wrap">
  <h1>{{ page.title }}</h1>
  <div class="page-body">
    {{ content }}
  </div>
</div>
