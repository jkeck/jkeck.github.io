<script id="cmdk-data" type="application/json">{
  "uptime": {{ site.time | date: "%Y" | minus: 2014 }},
  "posts": [{% for post in site.posts limit:5 %}{"d":{{ post.date | date: "%Y-%m-%d" | jsonify }},"t":{{ post.title | jsonify }},"u":{{ post.url | jsonify }}}{% unless forloop.last %},{% endunless %}{% endfor %}]
}</script>

<style>
  .cmdk-overlay {
    position: fixed; inset: 0; z-index: 9000;
    background: rgba(14,11,9,0.65);
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 18vh;
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
  }
  .cmdk-panel {
    width: 100%; max-width: 560px; margin: 0 20px;
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 10px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7);
    overflow: hidden;
  }
  .cmdk-search {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--rule2);
  }
  .cmdk-caret {
    font-family: var(--mono); font-size: 18px; color: var(--amber);
    user-select: none; line-height: 1; flex-shrink: 0;
  }
  .cmdk-q {
    flex: 1; background: none; border: none; outline: none;
    font-family: var(--mono); font-size: 14px; color: var(--text);
    caret-color: var(--amber); letter-spacing: 0.02em;
  }
  .cmdk-q::placeholder { color: var(--dim); }
  .cmdk-esc-hint {
    font-family: var(--mono); font-size: 10px; color: var(--dim);
    padding: 2px 6px; border: 1px solid var(--rule2); border-radius: 3px;
    user-select: none; flex-shrink: 0;
  }
  .cmdk-body { padding: 6px 0; max-height: 380px; overflow-y: auto; }
  .cmdk-group-label {
    font-family: var(--mono); font-size: 9.5px; color: var(--dim);
    letter-spacing: 0.14em; text-transform: uppercase;
    padding: 8px 18px 4px;
  }
  .cmdk-item {
    display: flex; align-items: center;
    padding: 10px 18px; cursor: pointer; text-decoration: none;
    color: var(--text-sub);
  }
  .cmdk-item:hover, .cmdk-item.is-active {
    background: var(--panel2); color: var(--text);
  }
  .cmdk-item-label { flex: 1; font-family: var(--sans); font-size: 14px; }
  .cmdk-item-hint  { font-family: var(--mono); font-size: 11px; color: var(--dim); }
  .cmdk-item.is-active .cmdk-item-hint { color: var(--muted); }
  .cmdk-empty {
    padding: 18px 18px 20px;
    font-family: var(--mono); font-size: 12px; color: var(--dim); letter-spacing: 0.04em;
  }
  .cmdk-tty {
    padding: 14px 18px 18px;
    font-family: var(--mono); font-size: 12.5px; line-height: 1.65;
    white-space: pre-wrap; color: var(--ok);
  }
  .cmdk-tty-err { color: #e07878; }
  @media (max-width: 600px) {
    .cmdk-panel { margin: 0 12px; }
    .cmdk-esc-hint { display: none; }
  }
</style>

<div id="cmdk" class="cmdk-overlay" role="dialog" aria-modal="true" aria-label="Command palette" style="display:none">
  <div class="cmdk-panel" id="cmdk-panel">
    <div class="cmdk-search">
      <span class="cmdk-caret" aria-hidden="true">›</span>
      <input class="cmdk-q" id="cmdk-q" type="text" placeholder="go to… or try: ls, whoami, help" autocomplete="off" spellcheck="false" aria-label="Command palette input">
      <span class="cmdk-esc-hint" aria-hidden="true">ESC</span>
    </div>
    <div class="cmdk-body" id="cmdk-body"></div>
  </div>
</div>

<script>
(function () {
  var overlay = document.getElementById('cmdk');
  var inp     = document.getElementById('cmdk-q');
  var body    = document.getElementById('cmdk-body');
  if (!overlay) return;

  var siteData = JSON.parse(document.getElementById('cmdk-data').textContent);

  var NAV = [
    { label: 'Home',     path: '/',          hint: '/'         },
    { label: 'Writing',  path: '/blog/',      hint: '/blog'     },
    { label: 'Projects', path: '/projects/',  hint: '/projects' },
    { label: 'Now',      path: '/now',        hint: '/now'      },
    { label: 'About',    path: '/about/',     hint: '/about'    },
  ];

  var historyLines = siteData.posts.map(function (p) { return p.d + '  ' + p.t; }).join('\n');

  var TTY = {
    'help':
      'NAME\n    jessiekeck.com\n\nCOMMANDS\n' +
      '    ls        list pages\n' +
      '    pwd       current path\n' +
      '    whoami    who runs this\n' +
      '    uptime    time since launch\n' +
      '    history   recent posts\n' +
      '    sudo      ...\n' +
      '    clear     reset',
    'whoami':  'jessie keck\nengineering manager · builder · open source contributor',
    'ls':      'drwxr-xr-x  about/\ndrwxr-xr-x  blog/\n-rw-r--r--  now\ndrwxr-xr-x  projects/',
    'pwd':     window.location.pathname,
    'uptime':  'up ' + siteData.uptime + ' years — first deploy 2014-05-26',
    'history': historyLines,
    'sudo':    'permission denied. (nice try.)',
  };

  var activeIdx    = -1;
  var currentItems = [];

  function open() {
    overlay.style.display = 'flex';
    overlay.setAttribute('aria-hidden', 'false');
    inp.value = '';
    render('');
    requestAnimationFrame(function () { inp.focus(); });
  }

  function close() {
    overlay.style.display = 'none';
    overlay.setAttribute('aria-hidden', 'true');
    activeIdx = -1;
    currentItems = [];
  }

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function render(raw) {
    var q = raw.trim().toLowerCase();
    activeIdx    = -1;
    currentItems = [];

    if (q === 'clear') { inp.value = ''; render(''); return; }

    if (q && TTY[q] !== undefined) {
      var out = TTY[q];
      var cls = (q === 'sudo') ? 'cmdk-tty cmdk-tty-err' : 'cmdk-tty';
      body.innerHTML = '<div class="' + cls + '">' + esc(out) + '</div>';
      return;
    }

    var matches = q
      ? NAV.filter(function (n) {
          return n.label.toLowerCase().indexOf(q) !== -1 || n.hint.indexOf(q) !== -1;
        })
      : NAV.slice();

    if (matches.length === 0) {
      body.innerHTML = '<div class="cmdk-empty">no match — try: help, ls, whoami, sudo</div>';
      return;
    }

    currentItems = matches;
    var html = '<div class="cmdk-group-label">Navigate</div>';
    matches.forEach(function (item, i) {
      html += '<a class="cmdk-item" href="' + esc(item.path) + '" data-idx="' + i + '">'
            + '<span class="cmdk-item-label">' + esc(item.label) + '</span>'
            + '<span class="cmdk-item-hint">'  + esc(item.hint)  + '</span>'
            + '</a>';
    });
    body.innerHTML = html;
  }

  function setActive(idx) {
    var items = body.querySelectorAll('.cmdk-item');
    if (!items.length) return;
    idx = Math.max(0, Math.min(idx, items.length - 1));
    items.forEach(function (el) { el.classList.remove('is-active'); });
    items[idx].classList.add('is-active');
    items[idx].scrollIntoView({ block: 'nearest' });
    activeIdx = idx;
  }

  inp.addEventListener('input', function () { render(this.value); });

  inp.addEventListener('keydown', function (e) {
    var items = body.querySelectorAll('.cmdk-item');
    if (e.key === 'ArrowDown') {
      e.preventDefault(); setActive(activeIdx + 1);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault(); setActive(activeIdx <= 0 ? 0 : activeIdx - 1);
    } else if (e.key === 'Enter') {
      if (activeIdx >= 0 && items[activeIdx]) {
        window.location.href = items[activeIdx].getAttribute('href');
      } else if (currentItems.length === 1) {
        window.location.href = currentItems[0].path;
      }
    } else if (e.key === 'Escape') {
      close();
    }
  });

  overlay.addEventListener('click', function (e) {
    if (e.target === overlay) close();
  });

  document.addEventListener('keydown', function (e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      overlay.style.display === 'none' ? open() : close();
    }
  });

  document.querySelectorAll('.cmdk-hint').forEach(function (btn) {
    btn.style.cursor = 'pointer';
    btn.addEventListener('click', function (e) { e.preventDefault(); open(); });
  });
}());
</script>
