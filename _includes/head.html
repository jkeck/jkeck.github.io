<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | prepend: site.baseurl | prepend: site.url }}">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1714;
      --panel:    #221f1a;
      --panel2:   #2a2620;
      --rule:     #3a342c;
      --rule2:    #2e2922;
      --text:     #e8e1d4;
      --text-sub: #b8ad99;
      --muted:    #8a8070;
      --dim:      #5e574c;
      --amber:    #d4a574;
      --ok:       #8db884;
      --serif:    "Newsreader", Georgia, serif;
      --display:  "Fraunces", "Newsreader", Georgia, serif;
      --sans:     "Inter", system-ui, sans-serif;
      --mono:     "IBM Plex Mono", ui-monospace, monospace;
    }
    [data-theme="light"] {
      --bg:       #f5f0ea;
      --panel:    #ede8e1;
      --panel2:   #e5dfd7;
      --rule:     #c0b8af;
      --rule2:    #d0c8c0;
      --text:     #2a2520;
      --text-sub: #5a5248;
      --muted:    #8a8078;
      --dim:      #a09890;
    }

    html, body { background: var(--bg); color: var(--text); font-family: var(--serif); min-height: 100vh; }

    .site { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }

    /* Nav strip — shared across all inner pages */
    .site-nav-strip {
      padding: 10px 36px;
      display: flex; align-items: center; gap: 14px;
      border-bottom: 1px solid var(--rule2);
      font-family: var(--mono); font-size: 10.5px; color: var(--muted); letter-spacing: 0.1em;
    }
    .nav-home {
      font-family: var(--display); font-size: 16px; font-weight: 500; font-style: italic;
      color: var(--text); text-decoration: none; letter-spacing: -0.01em;
    }
    .nav-home:hover { color: var(--amber); }
    .sep   { color: var(--dim); }
    .space { flex: 1; }

    .cmdk-hint {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 5px 8px 5px 10px;
      border: 1px solid var(--rule); border-radius: 6px;
      font-family: var(--sans); font-size: 12px; color: var(--text-sub);
      cursor: default; user-select: none;
    }
    .cmdk-hint .key {
      font-family: var(--mono); font-size: 10.5px;
      background: var(--panel2); color: var(--text);
      padding: 2px 6px; border-radius: 3px; border: 1px solid var(--rule);
    }

    .theme-toggle {
      all: unset; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--rule); background: var(--panel);
      padding: 3px; border-radius: 999px;
    }
    .pip { width: 22px; height: 22px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-family: var(--mono); }
    .pip-on  { background: var(--amber); color: var(--bg); }
    .pip-off { color: var(--muted); padding: 0 6px 0 2px; }

    /* Footer */
    .site-footer {
      padding: 12px 36px; border-top: 2px double var(--rule);
      display: flex; align-items: center;
      font-family: var(--mono); font-size: 10.5px; color: var(--dim); letter-spacing: 0.08em;
    }
    .site-footer a { margin-left: auto; color: var(--muted); text-decoration: none; }
    .site-footer a:hover { color: var(--amber); }

    @media (max-width: 768px) {
      .site-nav-strip { padding: 8px 20px; gap: 10px; }
      .site-footer { padding: 12px 20px; }
    }
  </style>
</head>
